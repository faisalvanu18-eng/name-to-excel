<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Continue</title>
  <style>
    body{font-family:Arial, sans-serif; background:#f5f6fa; margin:0; padding:0;}
    .box{max-width:420px; margin:80px auto; background:#fff; padding:24px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,.08);}
    input,button{width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; font-size:16px;}
    button{margin-top:12px; border:none; background:#111827; color:#fff; cursor:pointer;}
    button:hover{opacity:.95;}
    h2{margin:0 0 14px;}
    p{margin:0 0 14px; color:#555;}
  </style>
</head>
<body>
  <div class="box">
    <h2>Enter your name</h2>
    <p>To continue.</p>

    <form action="/submit" method="POST">
      <input type="text" name="name" placeholder="Your name" required />
      <button type="submit">Continue</button>
    </form>
  </div>
</body>
</html>
